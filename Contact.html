<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Contact Us</title>
    <link rel="stylesheet" href="css/Contact.css" />
    <script src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  </head>
  <body>
    <div class="Button_change">
      <button id="toggleBtn" onclick="toggleView()">Show Form</button>
    </div>
    <div class="container" id="container">
      <div class="form-container">
        <form>
          <h1>Contact Us Form</h1>
          <input
            type="text"
            id="firstName"
            placeholder="First Name"
            required
            class="form"
          />
          <input
            type="text"
            id="lastName"
            placeholder="Last Name"
            required
            class="form"
          />
          <input
            type="email"
            id="email"
            placeholder="Email"
            required
            class="form"
          />
          <input
            type="text"
            id="mobile"
            placeholder="Mobile"
            required
            class="form"
          />
          <h4>Type Your Message Here...</h4>
          <textarea id="message" required></textarea>
          <input type="submit" value="Send" id="button" />
        </form>
      </div>
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3835.685519820633!2d108.24980807490196!3d15.977790984688466!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3142108f210177eb%3A0xa2b68b2829065847!2zVHLGsOG7nW5nIMSQ4bqhaSBI4buNYyBWaeG7h3QgSMOgbiBOYW0gS-G7syBLaOG7n2kgTmdoxKlh!5e0!3m2!1svi!2s!4v1716465537983!5m2!1svi!2s"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          width="100%"
          height="450"
        ></iframe>
      </div>
    </div>
  </body>
  <script>
    function toggleView() {
        var container = document.getElementById("container");
        var button = document.getElementById("toggleBtn");

        if (container.classList.contains("show-form")) {
          container.classList.remove("show-form");
          container.classList.add("show-map");
          button.textContent = "Show Form";
        } else {
          container.classList.remove("show-map");
          container.classList.add("show-form");
          button.textContent = "Show Map";
        }
      }
    var button = document.querySelector("#button");
button.addEventListener('click', function(event) {
  event.preventDefault(); // Ngăn chặn hành vi mặc định của form

  // Lấy giá trị từ các trường trong form
  var firstName = document.querySelector("#firstName").value;
  var lastName = document.querySelector("#lastName").value;
  var email = document.querySelector("#email").value;
  var mobile = document.querySelector("#mobile").value;
  var message = document.querySelector("#message").value;

  // Kiểm tra xem các trường đã được điền đầy đủ chưa
  if (firstName && lastName && email && mobile && message) {
    sendMail(firstName, lastName, email, mobile, message);
  } else {
    alert("Please fill in all the required fields.");
  }
});

function sendMail(firstName, lastName, email, mobile, message) {
  (function(){
    emailjs.init("JR-NDwgLQhn69G1fQ"); // Account Public Key
  })();

  var name = lastName + " " + firstName;
  var params = {
    sendername: name,
    to: "webtruyen272@gmail.com",
    subject: "FEEDBACK FROM USER",
    replyto: "noreply@gmail.com",
    message:"Dear webtruyen272\n"+ message +"\n"+ "Best regards\nContact gmail:" + email + "\nPhone number" + mobile
  };

  var serviceID = "service_w9zgck3"; // Email Service ID
  var templateID = "template_tjjh4th"; // Email Template ID

  emailjs.send(serviceID, templateID, params)
    .then(function(response) {
      alert("Email sent successfully!");
    }, function(error) {
      alert("Failed to send email. Please try again later.");
    });
}

  </script>
</html>
