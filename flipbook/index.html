<!DOCTYPE html>
<html>
<head>
	<title>Amazing Book Page Flip Effect Using with Turn Js | jquery Plugin</title>
	<style type="text/css">
		 body {
            overflow: hidden;
            background: url('../img/holmes.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #album {
            width: 70%;
            height: 80%;
            max-width: 700px;
            max-height: 600px;
            margin: 5% auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease-in-out;
        }
        #album div {
            width: 100%;
            height: 100%;
            background-size: cover;
        }
	</style>
</head>
<body>

<div id="album">
	<div style="background: url('../img/OIP3.jfif'); background-size: 100% 100%;"></div>


</div>
<script>
	document.addEventListener("DOMContentLoaded", function() {
var sheetURL='https://docs.google.com/spreadsheets/d/1eE1TMwt1AVUOvw8NOYc0dilNAyMyBOvXKyZaGyKFGJk/edit?usp=drive_link'
  var Chapter='Chapter 1'
  var TrangList = document.querySelector('#album');
  var finishcount=1;
  var isFinish=false;
  var check=false;
  var numberChap=2;
	var xhr = new XMLHttpRequest();
xhr.open("GET", sheetURL, true);
xhr.onreadystatechange = function() {
	console.log(xhr.status) // tại sao lại 404
  if (xhr.readyState == 4 && xhr.status == 200) {
	console.log('ok')
    // Nội dung của trang web được trả về
    var response = xhr.responseText;
    // Sử dụng các phương thức xử lý DOM để phân tích cú pháp và lấy nội dung của cột đầu tiên
    var parser = new DOMParser();
    var htmlDoc = parser.parseFromString(response, 'text/html');
    var firstColumnCells = htmlDoc.querySelectorAll("td:nth-child("+numberChap+")"); // Chọn tất cả các ô trong cột đầu tiên
    // Lặp qua từng ô trong cột đầu tiên
    firstColumnCells.forEach(function(cell) {
      var text = cell.innerText.trim();
      if(text==Chapter||check==true){
        check=true; 
        if(text=='Sheet1') {isFinish=true;return;} // đoạn này để đảm bảo return cả hàm
      var imgElement = cell.querySelector("img");
      console.log(text); 
      if (imgElement) {
        var imageUrl = imgElement.src;
        console.log('img src: '+imageUrl)
        var img1 = document.createElement("img");
        img1.src=(imageUrl);
		const backgroundDiv = document.createElement('div');

// Thiết lập các thuộc tính CSS cho div
		backgroundDiv.style.background = 'url("'+imageUrl+'")';
		backgroundDiv.style.backgroundSize = 'cover';
		TrangList.append(backgroundDiv)
      } 
        }
    });
	$('#album').turn({gradients: true, acceleration: true});
  }
};
		xhr.send();})
</script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

<script src="turn.js"></script>
<script>

</script>
</body>
</html>
