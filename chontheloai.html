<style>
    .image{
        width: 300px;height: 500px;
       background-position: center right;
       background-attachment: fixed;
       background-size: cover; 
       background-repeat: no-repeat;
       border-radius: 5%;
       
    }
    .black{
        position: relative;
        width: 300px;height: 500px; border-radius: 5%;
        font-size: 80px;
        color: White;
        text-align: center;
        align-content: center;
        font-family: 'Bauhaus 93', sans-serif;
        z-index: 1;
        overflow: hidden;
    }
    .black::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 5%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -1;
            transition: none;
            order: 3;
        }

        .black:hover::before {
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            0% {
                transform: translateY(0);
                background-color: rgba(0, 0, 0, 0.5);
            }
            100% {
                transform: translateY(10%);
                background-color: rgba(0, 0, 0, 0);
            }
        }

        .growth {
            transform-origin: top;
            animation: growth 1.0 forwards;
            animation-timing-function: ease-in;
            animation-duration: 1s;
        }
        @keyframes growth {
        0% {
        transform: scaleY(1.0);
            }
        100% {
        transform: scaleY(2.0);
        }
    }
    .childgrowth {
            transform-origin: top;
            animation: childgrowth 1.0 forwards;
            animation-timing-function: ease-out;
            animation-duration: 1s;
        }
        @keyframes childgrowth {
        0% {
        transform: scaleY(1.0);
            }
        100% {
        transform: scaleY(0.0);
        }
    }

    /* body {
    width: 100vw; 
    height: 100vh; 
    overflow: hidden; 
    position: relative; 
    } */
  .circle1 {
    background-size: cover;
    background-image: url('https://cdn.buymeacoffee.com/uploads/rewards/2023-06-18/1/112528_thumbnail.png@1200w_0e.png');
    width: 90px;
    height: 120px;
    position: absolute;
    top: 100%;
    left: 45%;
    transform: translate(-50%, -50%);
    animation: zoomInAndOut 5s forwards; /* Sử dụng keyframes để tạo hiệu ứng vòng */
    z-index: -1;
    }

    @keyframes zoomInAndOut {
    0% {
        transform: translate(-50%, -50%) scale(1); /* Trạng thái ban đầu */
    }
    100% {
        transform: translate(-50%, -50%) scale(15); /* Trở về kích thước ban đầu */
        }
    }
    .typeclass{
        margin-right: 8%;
        margin-left: 8%;
        margin-top: 20px;
        background-size: cover;
        font-size: 30px;
        color: white;
        font-family: 'Bauhaus 93', sans-serif;
        width: 200px;
        height: 100px;
        border-radius: 20px;
    }
    .typeclass:hover{
        transform: scale(1.2);
    }
    .typeco {
         display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            padding: 20px;
    }

    <script>
        var category;
        var divbtn =document.querySelector('.divbtn')
        divbtn.style.visibility = 'hidden'
        var elements = document.querySelector('.typecontainer').children;
        var type = document.querySelector('.typecontainer');
        var parent = document.querySelector('.container')
        var array = Array.from(elements);
        array.forEach(element => {
            
            console.log(element.className)
          
            console.log(category)
            if(element.classList.contains('col-4')) {element.addEventListener("click", function(){choosetype(element)})}
            else {}
        });
        function choosetype(child)
        {
            var footer = document.getElementsByTagName('footer')[0];
        footer.style.position = 'absolute';footer.style.visibility= 'hidden'
            category= child.className.replace("col-4","")
            array.forEach(element => {
            element.classList.add('childgrowth')})
            child.addEventListener('animationend', function(event) {
            parent.classList.add('growth')
            var e = child.querySelector('.imaget'); // Lấy phần tử con có lớp 'image'
        var backgroundImageURL = e.style.backgroundImage; // Lấy giá trị của thuộc tính 'backgroundImage'
        // Xử lý chuỗi để chỉ lấy phần 
        parent.addEventListener('animationend', function(event) {
           
        var circle = document.querySelector('.circle');
        circle.style.backgroundImage = backgroundImageURL;
        circle.classList.add('circle1')
        circle.addEventListener('animationend', function(event) { generateType();divbtn.style.visibility = 'visible';})
                })
            })
            
        }
        var choose =[]
        function generateType()
        {
            type.innerHTML='';
             var names = [
               { url: 'https://lh3.google.com/u/0/d/1qq3xcbNEaL2OLSdZAn7VfcoVGTweLko5=k', text: 'Action' },
               { url: 'https://lh3.google.com/u/0/d/1b3MBlIFQllMOSh0EPdqaJWbupwHISz-N=k', text: 'Adventure' },
               { url: 'https://lh3.google.com/u/0/d/1nPOgvYPF6ptc8AC4f8wsfVW0pT11LBfJ=k', text: 'Comedy' },
               { url: 'https://lh3.google.com/u/0/d/1TlrXsO4kvd3cX5F3kBYpk1S1tbNadQVP=k', text: 'Fantasy' },
               { url: 'https://lh3.google.com/u/0/d/17AvNHLcP9LARIaC0TnB0xkpGEF2M5_wY=k', text: 'Mystery' },
               { url: 'https://lh3.google.com/u/0/d/1_OOfLpRSzWDkrS4Ys6gWRsvpEihrqFW5=k', text: 'Slice of life' },
               { url: 'https://lh3.google.com/u/0/d/1XCLnXJdHpZfJhgcJ2YPgyQo5R_emeH2y=k', text: 'School life' },
               { url: 'https://lh3.google.com/u/0/d/13-64-fbasGiY-wN_rLCMELNWG2poUZOw=k', text: 'Horror' },
               { url: 'https://lh3.google.com/u/0/d/1vP2_-ofhGtvFl9oT0IelPDPiwsWNMMLL=k', text: 'Romace' }
                ];
            // var names = ["Action", "Adventure", "Comedy", "Mystery", "Romance", "Slice of life", "School life", "Fantasy", "Horror"];
            for(var i =0;i<names.length;i++){
            (function(i){
            var blacklayout = document.createElement('div')
            var bg = document.createElement('div');
            blacklayout.innerHTML=names[i].text
            bg.classList.add("typeclass");
            bg.style.backgroundImage= "url('" + names[i].url + "')";
            bg.appendChild(blacklayout)
            bg.style.backgroundAttachment="fixed"
            bg.style.backgroundSize="cover"
            bg.style.backgroundPosition="center"
            blacklayout.style.backgroundColor="rgba(0, 0, 0, 0.5)"
            blacklayout.style.width="200px";blacklayout.style.height="100px";blacklayout.style.textAlign="center";blacklayout.style.alignContent="center";blacklayout.style.borderRadius='20px'
            bg.addEventListener("click", function(){
            if(bg.childElementCount>0) {bg.removeChild(blacklayout);bg.style.transform = 'scale(1.2)';choose.push(names[i].text);}
            else {bg.appendChild(blacklayout);bg.style.transform='scale(1.0)';choose.pop(names[i].text);}
        })
            
            type.className='typeco'
            type.appendChild(bg); 
            })(i)
            }
        }
        document.addEventListener("DOMContentLoaded", function() {
    var button = document.querySelector('.theloaibtn');
    
  // Gán sự kiện onclick cho nút
    if(button){
    button.addEventListener('click', function(event) {
    window.location.href="testsearch.html?datachoose="+choose+"&category="+category;
    });
            }
    });
    </script>
